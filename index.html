<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Busan Travel App</title>

<style>
:root{
--main:#5C7A89;
--deep:#3E5561;
--light:#F1F3F4;
--glass:rgba(255,255,255,0.92);
--text:#333;
}

body{
margin:0;
font-family:"Noto Sans TC",sans-serif;
color:var(--text);
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center center fixed;
background-size:cover;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(240,242,243,0.85);
backdrop-filter:blur(4px);
z-index:-1;
}

header{
background:var(--deep);
color:white;
text-align:center;
padding:16px;
font-size:18px;
}

.countdown{
font-size:13px;
margin-top:4px;
opacity:0.9;
}

/* 滑動容器 */
.app{
display:flex;
width:300%;
height:calc(100vh - 120px);
transition:transform 0.3s ease;
}

.page{
width:100%;
overflow-y:auto;
padding:20px;
}

.card{
background:var(--glass);
padding:16px;
margin-bottom:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h2{
margin:0 0 10px 0;
color:var(--deep);
}

.timeline{
border-left:3px solid var(--main);
padding-left:15px;
margin-left:10px;
}

.timeline-item{margin-bottom:12px;}
.time{font-weight:bold;color:var(--deep);}

/* 清單 */
.checklist-item{
position:relative;
padding:10px 0;
border-bottom:1px solid #eee;
overflow:hidden;
}

.checklist-content{
transition:0.3s;
}

.delete-btn{
position:absolute;
right:0;
top:0;
bottom:0;
width:80px;
background:#d9534f;
color:white;
border:none;
}

.add-area{
display:flex;
margin-top:8px;
}
.add-area input{flex:1;padding:8px;}
.add-area button{
background:var(--main);
color:white;
border:none;
padding:8px 12px;
}

.photo-area{
margin-top:10px;
}
.photo-area input[type="file"]{
display:block;
margin-bottom:5px;
}

/* 底部導覽 */
.tabbar{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:white;
border-top:1px solid #ddd;
}

.tabbar button{
flex:1;
padding:14px;
border:none;
background:none;
font-size:14px;
}

.tabbar button.active{
color:var(--deep);
font-weight:bold;
}
</style>
</head>

<body>

<header>
BUSAN TRAVEL
<div class="countdown" id="countdown"></div>
</header>

<div class="app" id="app">

<!-- 行程表 -->
<div class="page">
<div class="card">
<h2>Day1 3/19</h2>
<div class="timeline">
<div class="timeline-item"><div class="time">18:25 ✈️</div>抵達金海機場</div>
<div class="timeline-item"><div class="time">21:00 🍜</div>豬肉湯飯</div>
</div>
</div>

<div class="card">
<h2>Day6 3/24</h2>
<div class="timeline">
<div class="timeline-item"><div class="time">08:00 🚗</div>前往機場</div>
<div class="timeline-item"><div class="time">12:00 ✈️</div>BX795</div>
</div>
</div>
</div>

<!-- 航班 -->
<div class="page">
<div class="card">
<h2>去程</h2>
<p>3/19 15:00 ➜ 18:25 BX796</p>
<p>出發地：高雄小港機場第一航廈 Terminal1</p>
<p>抵達地：釜山金浦機場第一航廈 Terminal1</p>
</div>
<div class="card">
<h2>回程</h2>
<p>3/24 12:00 ➜ 14:00 BX795</p>
<p>出發地：釜山金浦機場第一航廈 Terminal1</p>
<p>抵達地：高雄小港機場第一航廈 Terminal1</p>
</div>
</div>

<!-- 清單 -->
<div class="page" id="checklist-page"></div>

</div>

<div class="tabbar">
<button class="active" onclick="goPage(0)">行程</button>
<button onclick="goPage(1)">航班</button>
<button onclick="goPage(2)">清單</button>
</div>

<script>

/* 分頁滑動 */
let current=0;
const app=document.getElementById("app");

function goPage(index){
current=index;
app.style.transform=`translateX(-${index*100}%)`;
document.querySelectorAll(".tabbar button").forEach((b,i)=>{
b.classList.toggle("active",i===index);
});
}

/* 手勢滑動 */
let startX=0;
app.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});
app.addEventListener("touchend",e=>{
let diff=startX-e.changedTouches[0].clientX;
if(diff>50 && current<2) goPage(current+1);
if(diff<-50 && current>0) goPage(current-1);
});

/* 倒數 */
const tripDate=new Date("2026-03-19");
const today=new Date();
const diff=Math.ceil((tripDate-today)/(1000*60*60*24));
document.getElementById("countdown").innerText=
diff>0?`距離出發還有 ${diff} 天`:"旅程中 ✈️";

/* 清單資料 */
const defaults={
doc:["護照","機票(紙本)","台幣(2w以上建議多帶一些)","外幣(韓圓)","住宿資訊","交通資訊","門票資訊","信用卡","wowpass"],
tech:["充電線","充電器","行動電源","轉接器","wifi機","耳機","電子磅秤","壓縮機"],
cloth:["貼身衣物(內衣褲)","衣服","褲子","外套","睡衣","襪子","室內拖","拖鞋","圍巾","帽子","手套","隱形眼鏡","眼鏡","藥水","衣服壓縮袋","吹風機","濕紙巾","衛生紙","飲料提袋","牙線"],
wash:["洗面乳","卸妝乳","沐浴乳","洗髮乳","洗臉巾","棉花棒","牙膏牙刷","卸妝棉","香水","髮油","保養品","防曬","浴巾","髮巾","毛巾","梳子","髮夾","髮捲"],
remind:["吹風機要確認有接受220V","投保旅平不便險","氣溫約3-15度，海邊風大，早晚溫差大"]
};

let data=JSON.parse(localStorage.getItem("busanList"))||{
doc:defaults.doc.map(t=>({text:t,custom:false,checked:false})),
tech:defaults.tech.map(t=>({text:t,custom:false,checked:false})),
cloth:defaults.cloth.map(t=>({text:t,custom:false,checked:false})),
wash:defaults.wash.map(t=>({text:t,custom:false,checked:false})),
remind:defaults.remind.map(t=>({text:t,custom:false,checked:false}))
};

function save(){localStorage.setItem("busanList",JSON.stringify(data));}

function renderChecklist(){
const page=document.getElementById("checklist-page");
page.innerHTML="";
for(let key in data){
const card=document.createElement("div");
card.className="card";
card.innerHTML=`<h2>${key}</h2>
<div id="${key}-list"></div>
<div class="add-area">
<input id="${key}-input" placeholder="新增項目">
<button onclick="addItem('${key}')">新增</button>
</div>
<div class="photo-area">
<input type="file" id="${key}-photo" onchange="previewPhoto(event,'${key}')">
<img id="${key}-preview" style="max-width:100%;margin-top:5px;display:none">
</div>`;
page.appendChild(card);

const list=card.querySelector(`#${key}-list`);

data[key].forEach((item,index)=>{
const div=document.createElement("div");
div.className="checklist-item";

const content=document.createElement("div");
content.className="checklist-content";
content.innerHTML=`<label>
<input type="checkbox" ${item.checked?"checked":""}
onchange="toggleCheck('${key}',${index})">
${item.text}
</label>`;
div.appendChild(content);

if(item.custom){
let startX=0;
div.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
div.addEventListener("touchmove",e=>{
if(startX-e.touches[0].clientX>50)
content.style.transform="translateX(-80px)";
});
const del=document.createElement("button");
del.className="delete-btn";
del.innerText="刪除";
del.onclick=()=>{
data[key].splice(index,1);
save();
renderChecklist();
};
div.appendChild(del);
}

list.appendChild(div);
});
}
}

function toggleCheck(type,index){
data[type][index].checked=!data[type][index].checked;
save();
}

function addItem(type){
const input=document.getElementById(type+"-input");
if(!input.value)return;
data[type].push({text:input.value,custom:true,checked:false});
save();
renderChecklist();
}

function previewPhoto(event,key){
const preview=document.getElementById(key+'-preview');
if(event.target.files && event.target.files[0]){
const reader=new FileReader();
reader.onload=e=>{
preview.src=e.target.result;
preview.style.display='block';
};
reader.readAsDataURL(event.target.files[0]);
}
}

renderChecklist();

</script>

</body>
</html>
