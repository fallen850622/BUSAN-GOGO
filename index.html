<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busan Travel App</title>
<style>
:root{
--main:#5C7A89;
--deep:#3E5561;
--light:#F1F3F4;
--text:#333;
--travel:#FF6B6B;
--food:#FFA94D;
--transport:#339AF0;
--activity:#51CF66;
}
body{
margin:0;
font-family:"Noto Sans TC",sans-serif;
color:var(--text);
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center center fixed;
background-size:cover;
}
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(240,242,243,0.85);
backdrop-filter:blur(4px);
z-index:-1;
}
header{
background:var(--deep);
color:white;
text-align:center;
padding:16px;
font-size:18px;
}
.countdown{font-size:13px;margin-top:4px;opacity:0.9;}
.page{
position:absolute;
top:80px; bottom:60px; left:0; right:0;
overflow-y:auto;
padding:15px;
box-sizing:border-box;
display:none;
}
.page.active{display:block;}
.card{
background:var(--light);
padding:16px;
margin-bottom:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
h2{margin:0 0 10px 0;color:var(--deep);}
.timeline{border-left:4px solid var(--main);padding-left:15px;margin-left:10px;}
.timeline-item{margin-bottom:12px;position:relative;padding-left:10px;}
.timeline-item::before{
content:'';
width:10px;height:10px;border-radius:50%;
position:absolute;left:-12px;top:6px;background:var(--main);
}
.time{font-weight:bold;color:var(--deep);}
.checklist-item{padding:8px 0;border-bottom:1px solid #eee;}
input[type="checkbox"]{margin-right:8px;}
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:white;border-top:1px solid #ddd;z-index:100;}
.tabbar button{flex:1;padding:14px;border:none;background:none;font-size:14px;}
.tabbar button.active{color:var(--deep);font-weight:bold;}
.notice{color:red;margin-top:8px;font-size:13px;}
.timeline-item.travel{border-left-color:var(--travel);}
.timeline-item.food{border-left-color:var(--food);}
.timeline-item.transport{border-left-color:var(--transport);}
.timeline-item.activity{border-left-color:var(--activity);}
</style>
</head>
<body>

<header>
BUSAN TRAVEL
<div class="countdown" id="countdown"></div>
</header>

<!-- 行程表頁面 -->
<div class="page active" id="schedule-page"></div>

<!-- 航班頁面 -->
<div class="page" id="flight-page">
<div class="card">
<h2>⚠️ 去程航班</h2>
<p>3/19 15:00 ➜ 18:25 BX796</p>
<p>出發：高雄小港機場第一航廈 Terminal1</p>
<p>抵達：釜山金浦機場第一航廈 Terminal1</p>
</div>

<div class="card">
<h2>⚠️ 回程航班</h2>
<p>3/24 12:00 ➜ 14:00 BX795</p>
<p>出發：釜山金浦機場第一航廈 Terminal1</p>
<p>抵達：高雄小港機場第一航廈 Terminal1</p>
</div>
</div>

<!-- 清單頁面 -->
<div class="page" id="checklist-page"></div>

<!-- 底部導覽 -->
<div class="tabbar">
<button class="active" onclick="showPage('schedule-page',this)">行程</button>
<button onclick="showPage('flight-page',this)">航班</button>
<button onclick="showPage('checklist-page',this)">清單</button>
</div>

<script>
// 分頁切換
function showPage(id,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// 倒數
const tripDate=new Date("2026-03-19");
document.getElementById("countdown").innerText=
Math.ceil((tripDate-new Date())/(1000*60*60*24))>0?`距離出發還有 ${Math.ceil((tripDate-new Date())/(1000*60*60*24))} 天`:"旅程中 ✈️";

// 行程表資料
const days=[
{day:"Day1 3/19 (週四)",timeline:[
  {time:"18:25 ✈️",text:"抵達金海機場 (BX796)",type:"travel"},
  {time:"19:30 🚗",text:"搭乘包車前往飯店（車程60分鐘）",type:"transport"},
  {time:"20:30 🏨",text:"飯店 Check-in：Best Western 海雲台",type:"activity"},
  {time:"21:00 🍴",text:"晚餐：水邊最高豬肉湯飯 (步行 1 分鐘)",type:"food"}
]},
{day:"Day2 3/20 (週五)",timeline:[
  {time:"08:30 🍳",text:"早餐 Egg Drop 海雲台店 (走路7分鐘) 9:45離開",type:"food"},
  {time:"10:30 🏞️",text:"甘川文化村-小王子 (車程40分鐘) 12點離開",type:"activity"},
  {time:"12:15 - 15:00 🛍️",text:"國際市場、光復路購物街、樂天百貨 (買棉被-逛街購物-午餐) 車程15分鐘",type:"activity"},
  {time:"15:00 🗼",text:"釜山塔 步行至手扶梯",type:"activity"},
  {time:"16:10 🚇",text:"搭地鐵至西面吃飯+逛街7站 (地鐵25分鐘) W1600",type:"transport"},
  {time:"16:30 🍖",text:"晚餐：83 獬豸烤肉 (派人先抽號碼牌) 回程：搭地鐵15站 (地鐵40分鐘) W1800",type:"food"}
]},
{day:"Day3 3/21 (週六)",timeline:[
  {time:"09:30 🍞",text:"早餐 OPS 烘培屋 (走路7分鐘)",type:"food"},
  {time:"10:00 🏬",text:"新世界百貨 Centum City 午餐 14:00離開",type:"activity"},
  {time:"14:30 🛒",text:"E-mart 海雲台店 (伴手禮採買) 16:00離開",type:"activity"},
  {time:"16:00 🏨",text:"返回住宿放東西",type:"activity"},
  {time:"17:00 🌊",text:"廣安里海灘+無人機秀(晚上8點) 搭地鐵5站(地鐵20分鐘) W1600",type:"activity"}
]},
{day:"Day4 3/22 (週日)",timeline:[
  {time:"08:30 🍳",text:"早餐超商",type:"food"},
  {time:"09:00 🏯",text:"東海龍宮 譽為韓國最美寺廟之一 10:30離開 (車程25分鐘)",type:"activity"},
  {time:"10:45 🚡",text:"斜坡滑車 (Skyline Luge) 12點前離開 走路10分鐘 啟用VBP免費玩2次",type:"activity"},
  {time:"12:30 🍲",text:"尾浦站附近 午餐(車程20分鐘) 15:00離開",type:"food"},
  {time:"15:00 🚆",text:"搭乘海岸列車 (尾浦➡️海月展望台)",type:"transport"},
  {time:"16:00 🚆",text:"搭乘海岸列車 (海月展望台➡️青沙浦)",type:"transport"},
  {time:"17:30-18:00 🚆",text:"搭乘膠囊列車(青沙浦➡️尾浦)",type:"transport"},
  {time:"18:15 🌃",text:"釜山 X the SKY 100F夜景與世界最高的星巴克 走路7分鐘VBP持卡免費 回程：步行回飯店(走路14分)",type:"activity"}
]},
{day:"Day5 3/23 (週一)",timeline:[
  {time:"09:00 🍳",text:"早餐超商 (車程40分鐘)",type:"food"},
  {time:"09:40 🖼️",text:"ARTE MUSEUM Busan 釜山藝術博物館 VBP持卡免費 11點離開",type:"activity"},
  {time:"11:10 ☕",text:"Thrill on the Mug 咖啡廳 12:30離開 車程10分鐘",type:"food"},
  {time:"13:00 🏖️",text:"海雲台傳統市場巡禮 海雲台沙灘 車程40分鐘",type:"activity"},
  {time:"17:00 🛍️",text:"飯店附近最後補漏採買(藥妝 超商 大創等等…) 行李整理 秤重量",type:"activity"}
]},
{day:"Day6 3/24 (週二)",timeline:[
  {time:"08:00 🚗",text:"出發金海機場 預約包車（車程 60 分鐘）",type:"transport"},
  {time:"12:00 ✈️",text:"BX795 起飛",type:"travel"}
]}
];

// 渲染行程表
const schedulePage=document.getElementById("schedule-page");
days.forEach(d=>{
const card=document.createElement("div");card.className="card";
card.innerHTML=`<h2>${d.day}</h2><div class="timeline"></div>`;
const tl=card.querySelector(".timeline");
d.timeline.forEach(t=>{
const div=document.createElement("div");
div.className="timeline-item "+t.type;
div.innerHTML=`<div class="time">${t.time}</div>${t.text}`;
tl.appendChild(div);
});
schedulePage.appendChild(card);
});

// 清單資料
const checklistData={
"重要文件":["護照","機票(紙本)","台幣(2w以上建議多帶一些)","外幣(韓圓)","住宿資訊","交通資訊","門票資訊","信用卡","wowpass"],
"3C產品":["充電線","充電器","行動電源","轉接器","wifi機","耳機","電子磅秤","壓縮機"],
"盥洗用品":["洗面乳","卸妝乳","沐浴乳","洗髮乳","洗臉巾","棉花棒","牙膏牙刷","卸妝棉","香水","髮油","保養品","防曬","浴巾","髮巾","毛巾","梳子","髮夾","髮捲"],
"衣物備品":["貼身衣物(內衣褲)","衣服","褲子","外套","睡衣","襪子","室內拖","拖鞋","圍巾","帽子","手套","隱形眼鏡","眼鏡","藥水","衣服壓縮袋","吹風機","濕紙巾","衛生紙","飲料提袋","牙線"],
"提醒事項":["1. 吹風機要確認有接受220V","2. 投保旅平不便險","3. 氣溫約3-15度，海邊風大，早晚溫差大"]
};
let data=JSON.parse(localStorage.getItem("busanList"))||{};
for(let key in checklistData){if(!data[key]) data[key]=checklistData[key].map(t=>({text:t,checked:false}));}
function save(){localStorage.setItem("busanList",JSON.stringify(data));}
function renderChecklist(){
const page=document.getElementById("checklist-page");
page.innerHTML="";
for(let key in data){
const card=document.createElement("div");
card.className="card";
card.innerHTML=`<h2>${key}</h2>`;
data[key].forEach(item=>{
const div=document.createElement("div");
div.className="checklist-item";
div.innerHTML=`<label><input type="checkbox" ${item.checked?"checked":""} onchange="toggleCheck('${key}','${item.text}')">${item.text}</label>`;
card.appendChild(div);
});
page.appendChild(card);
}}
function toggleCheck(type,text){
const index=data[type].findIndex(i=>i.text===text);
if(index>=0){data[type][index].checked=!data[type][index].checked;save();}
}
renderChecklist();
</script>

</body>
</html>
