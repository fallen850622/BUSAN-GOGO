<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Busan Travel App</title>
<style>
:root{
--main:#5C7A89;
--deep:#3E5561;
--light:#F1F3F4;
--glass:rgba(255,255,255,0.92);
--text:#333;
}
body{
margin:0;
font-family:"Noto Sans TC",sans-serif;
color:var(--text);
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center center fixed;
background-size:cover;
overflow:hidden;
}
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(240,242,243,0.85);
backdrop-filter:blur(4px);
z-index:-1;
}
header{
background:var(--deep);
color:white;
text-align:center;
padding:16px;
font-size:18px;
}
.countdown{
font-size:13px;
margin-top:4px;
opacity:0.9;
}
.app{
display:flex;
width:300%;
height:calc(100vh - 120px);
transition:transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.page{
width:100%;
overflow-y:auto;
padding:20px;
}
.card{
background:var(--glass);
padding:16px;
margin-bottom:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
h2{
margin:0 0 10px 0;
color:var(--deep);
cursor:pointer;
}
.timeline{
border-left:3px solid var(--main);
padding-left:15px;
margin-left:10px;
}
.timeline-item{margin-bottom:12px;}
.time{font-weight:bold;color:var(--deep);}
.checklist-item{
position:relative;
padding:10px 0;
border-bottom:1px solid #eee;
overflow:hidden;
}
.checklist-content{
transition:0.3s;
}
.delete-btn{
position:absolute;
right:0;
top:0;
bottom:0;
width:80px;
background:#d9534f;
color:white;
border:none;
}
.add-area{
display:flex;
margin-top:8px;
}
.add-area input{flex:1;padding:8px;}
.add-area button{
background:var(--main);
color:white;
border:none;
padding:8px 12px;
}
.photo-area{
margin-top:10px;
}
.photo-area input[type="file"]{
display:block;
margin-bottom:5px;
}
.list-collapse{
display:none;
}
.tabbar{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:white;
border-top:1px solid #ddd;
}
.tabbar button{
flex:1;
padding:14px;
border:none;
background:none;
font-size:14px;
}
.tabbar button.active{
color:var(--deep);
font-weight:bold;
}
.export-btn{
width:90%;
margin:10px auto;
display:block;
padding:10px;
background:var(--main);
color:white;
border:none;
border-radius:8px;
font-size:16px;
}
</style>
</head>
<body>

<header>
BUSAN TRAVEL
<div class="countdown" id="countdown"></div>
</header>

<!-- 匯出 PDF 按鈕 -->
<button class="export-btn" onclick="exportPDF()">匯出旅遊小書 PDF 📖</button>

<div class="app" id="app">
<!-- 行程表 -->
<div class="page" id="schedule-page"></div>

<!-- 航班 -->
<div class="page" id="flight-page">
<div class="card">
<h2>去程</h2>
<p>3/19 15:00 ➜ 18:25 BX796</p>
<p>出發地：高雄小港機場第一航廈 Terminal1</p>
<p>抵達地：釜山金浦機場第一航廈 Terminal1</p>
</div>
<div class="card">
<h2>回程</h2>
<p>3/24 12:00 ➜ 14:00 BX795</p>
<p>出發地：釜山金浦機場第一航廈 Terminal1</p>
<p>抵達地：高雄小港機場第一航廈 Terminal1</p>
</div>
</div>

<!-- 清單 -->
<div class="page" id="checklist-page"></div>
</div>

<div class="tabbar">
<button class="active" onclick="goPage(0)">行程</button>
<button onclick="goPage(1)">航班</button>
<button onclick="goPage(2)">清單</button>
</div>

<!-- jsPDF 與 html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/* Tab 切換 */
let current=0;
const app=document.getElementById("app");
function goPage(index){
current=index;
app.style.transition="transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)";
app.style.transform=`translateX(-${index*100}%)`;
document.querySelectorAll(".tabbar button").forEach((b,i)=>b.classList.toggle("active",i===index));
}

/* 倒數 */
const tripDate=new Date("2026-03-19");
const today=new Date();
const diff=Math.ceil((tripDate-today)/(1000*60*60*24));
document.getElementById("countdown").innerText=diff>0?`距離出發還有 ${diff} 天`:"旅程中 ✈️";

/* 每日行程 Day1~Day6 */
const days=[
{day:"Day1 3/19",timeline:[{time:"18:25 ✈️",text:"抵達金海機場"},{time:"21:00 🍜",text:"豬肉湯飯"}]},
{day:"Day2 3/20",timeline:[{time:"09:00 🏰",text:"甘川文化村"},{time:"12:00 🍲",text:"午餐：海鮮鍋"},{time:"14:00 🛍️",text:"西面商圈逛街"},{time:"18:00 🌉",text:"廣安大橋夜景"}]},
{day:"Day3 3/21",timeline:[{time:"08:00 🚗",text:"前往海雲台"},{time:"10:00 🏖️",text:"海雲台海灘散步"},{time:"12:00 🍴",text:"午餐：韓式烤肉"},{time:"15:00 🏞️",text:"APEC會議場景"},{time:"19:00 🍜",text:"晚餐：豬肉湯飯"}]},
{day:"Day4 3/22",timeline:[{time:"09:00 🛍️",text:"樂天百貨購物"},{time:"12:00 🍲",text:"午餐：炸雞啤酒"},{time:"14:00 🏯",text:"東萊古寺參觀"},{time:"17:00 ☕",text:"咖啡廳休息"}]},
{day:"Day5 3/23",timeline:[{time:"08:30 🚗",text:"前往影島"},{time:"11:00 🏝️",text:"影島海邊散步"},{time:"13:00 🍴",text:"午餐：海鮮餐廳"},{time:"15:00 🏞️",text:"松島天空步道"},{time:"19:00 🌃",text:"夜市小吃"}]},
{day:"Day6 3/24",timeline:[{time:"08:00 🚗",text:"前往機場"},{time:"12:00 ✈️",text:"BX795"}]}
];
const schedulePage=document.getElementById("schedule-page");
days.forEach(d=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h2>${d.day}</h2><div class="timeline"></div>`;
  const tl=card.querySelector(".timeline");
  d.timeline.forEach(item=>{
    const div=document.createElement("div");
    div.className="timeline-item";
    div.innerHTML=`<div class="time">${item.time}</div>${item.text}`;
    tl.appendChild(div);
  });
  schedulePage.appendChild(card);
});

/* 清單資料 */
const defaults={
doc:["護照","機票(紙本)","台幣(2w以上建議多帶一些)","外幣(韓圓)","住宿資訊","交通資訊","門票資訊","信用卡","wowpass"],
tech:["充電線","充電器","行動電源","轉接器","wifi機","耳機","電子磅秤","壓縮機"],
cloth:["貼身衣物(內衣褲)","衣服","褲子","外套","睡衣","襪子","室內拖","拖鞋","圍巾","帽子","手套","隱形眼鏡","眼鏡","藥水","衣服壓縮袋","吹風機","濕紙巾","衛生紙","飲料提袋","牙線"],
wash:["洗面乳","卸妝乳","沐浴乳","洗髮乳","洗臉巾","棉花棒","牙膏牙刷","卸妝棉","香水","髮油","保養品","防曬","浴巾","髮巾","毛巾","梳子","髮夾","髮捲"],
remind:["吹風機要確認有接受220V","投保旅平不便險","氣溫約3-15度，海邊風大，早晚溫差大"]
};
let data=JSON.parse(localStorage.getItem("busanList"))||{
doc:defaults.doc.map(t=>({text:t,custom:false,checked:false})),
tech:defaults.tech.map(t=>({text:t,custom:false,checked:false})),
cloth:defaults.cloth.map(t=>({text:t,custom:false,checked:false})),
wash:defaults.wash.map(t=>({text:t,custom:false,checked:false})),
remind:defaults.remind.map(t=>({text:t,custom:false,checked:false}))
};
function save(){localStorage.setItem("busanList",JSON.stringify(data));}

function renderChecklist(){
  const page=document.getElementById("checklist-page");
  page.innerHTML="";
  for(let key in data){
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<h2 onclick="toggleCollapse('${key}')">${key}</h2>
    <div class="list-collapse" id="${key}-list"></div>
    <div class="add-area">
      <input id="${key}-input" placeholder="新增項目">
      <button onclick="addItem('${key}')">新增</button>
    </div>
    <div class="photo-area">
      <input type="file" id="${key}-photo" onchange="previewPhoto(event,'${key}')">
      <img id="${key}-preview" style="max-width:100%;margin-top:5px;display:none">
    </div>`;
    page.appendChild(card);
    const list=card.querySelector(`#${key}-list`);
    data[key].forEach((item,index)=>{
      const div=document.createElement("div");
      div.className="checklist-item";
      const content=document.createElement("div");
      content.className="checklist-content";
      content.innerHTML=`<label>
      <input type="checkbox" ${item.checked?"checked":""} onchange="toggleCheck('${key}',${index})">
      ${item.text}
      </label>`;
      div.appendChild(content);
      if(item.custom){
        const del=document.createElement("button");
        del.className="delete-btn";
        del.innerText="刪除";
        del.onclick=()=>{
          data[key].splice(index,1);
          save();
          renderChecklist();
        };
        div.appendChild(del);
      }
      list.appendChild(div);
    });
  }
}
function toggleCollapse(key){
  const el=document.getElementById(key+'-list');
  el.style.display = el.style.display==='block'?'none':'block';
}
function toggleCheck(type,index){data[type][index].checked=!data[type][index].checked;save();}
function addItem(type){const input=document.getElementById(type+"-input");if(!input.value)return;data[type].push({text:input.value,custom:true,checked:false});save();renderChecklist();}
function previewPhoto(event,key){const preview=document.getElementById(key+'-preview');if(event.target.files && event.target.files[0]){const reader=new FileReader();reader.onload=e=>{preview.src=e.target.result;preview.style.display='block';};reader.readAsDataURL(event.target.files[0]);}
}
renderChecklist();

/* 匯出 PDF 功能 */
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const margin=10;
  let yOffset = margin;
  for(let day of days){
    const tmpDiv = document.createElement('div');
    tmpDiv.style.width='800px';
    tmpDiv.style.padding='10px';
    tmpDiv.style.background='white';
    tmpDiv.innerHTML = `<h2>${day.day}</h2><ul>${day.timeline.map(t=>`<li>${t.time} ${t.text}</li>`).join('')}</ul>`;
    // 加入照片
    for(let key in data){
      const photoInput = document.getElementById(key+'-photo');
      if(photoInput && photoInput.files && photoInput.files[0]){
        const reader = new FileReader();
        await new Promise(resolve=>{
          reader.onload=e=>{
            const img = document.createElement('img');
            img.src = e.target.result;
            img.style.maxWidth='780px';
            img.style.display='block';
            img.style.marginTop='5px';
            tmpDiv.appendChild(img);
            resolve();
          }
          reader.readAsDataURL(photoInput.files[0]);
        });
      }
    }
    const canvas = await html2canvas(tmpDiv,{scale:2});
    const imgData = canvas.toDataURL('image/jpeg',1.0);
    const imgProps = pdf.getImageProperties(imgData);
    const pdfWidth = pdf.internal.pageSize.getWidth()-2*margin;
    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
    if(yOffset + pdfHeight > pdf.internal.pageSize.getHeight()-margin){
      pdf.addPage();
      yOffset = margin;
    }
    pdf.addImage(imgData,'JPEG',margin,yOffset,pdfWidth,pdfHeight);
    yOffset += pdfHeight + 10;
  }
  pdf.save("Busan_Travel_Book.pdf");
}
</script>

</body>
</html>
